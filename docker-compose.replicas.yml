# Two-replica overlay: the production-deployable shell (still NOT "enterprise").
#   docker compose -f docker-compose.yml -f docker-compose.replicas.yml up -d --build
#   bash scripts/two_replica_proof.sh
# Both replicas run with RAGBRAIN_SHARED_STATE=1: session ownership/config and rate counters
# live in Redis (the FalkorDB server), so any replica serves any session and the token-ownership
# scoping semantics hold across replicas. Put a real load balancer in front for production.
services:
  api:
    environment:
      RAGBRAIN_SHARED_STATE: "1"
      # a second VALID token so the proof can assert a true cross-token 403 (not just 401)
      RAGBRAIN_API_TOKENS: "${RAGBRAIN_DEMO_TOKEN:-ragbrain-demo-token},${RAGBRAIN_DEMO_TOKEN:-ragbrain-demo-token}-other"

  api2:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      falkordb:
        condition: service_healthy
    environment:
      RAGBRAIN_FALKORDB_HOST: falkordb
      RAGBRAIN_FALKORDB_PORT: "6379"
      RAGBRAIN_SHARED_STATE: "1"
      RAGBRAIN_API_TOKENS: "${RAGBRAIN_DEMO_TOKEN:-ragbrain-demo-token},${RAGBRAIN_DEMO_TOKEN:-ragbrain-demo-token}-other"
      RAGBRAIN_CORS_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      RAGBRAIN_LLM_API_KEY: ${RAGBRAIN_LLM_API_KEY:-}
      RAGBRAIN_LLM_BASE_URL: ${RAGBRAIN_LLM_BASE_URL:-}
      RAGBRAIN_LLM_MODEL: ${RAGBRAIN_LLM_MODEL:-}
      RAGBRAIN_EMBEDDER_API_KEY: ${RAGBRAIN_EMBEDDER_API_KEY:-}
    ports:
      - "8001:8000"
