name: integration

# CI integration lane (CI-INT): spins up real backends (FalkorDB + Neo4j) and runs the full
# integration suite - heartbeat / loop / replay / multi-backend parity. Two service containers
# make this the most expensive job, so it runs WEEKLY and on demand (workflow_dispatch), NOT on
# every push, to keep private-repo Actions minutes in budget. The core un-knowing invariant is
# still gated per-PR by the cheaper `replay-invariant` job in ci.yml (FalkorDB only, no key).
# LLM-dependent tests run only when the RAGBRAIN_LLM_* secrets are set; otherwise they skip.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"   # weekly (Mon 06:00 UTC)

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    services:
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 6379:6379
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/ragbraintest
        ports:
          - 7687:7687
          - 7474:7474
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"
      - name: Integration suite (real backends; LLM tests gated on secret)
        env:
          RAGBRAIN_LLM_API_KEY: ${{ secrets.RAGBRAIN_LLM_API_KEY }}
          RAGBRAIN_LLM_BASE_URL: ${{ secrets.RAGBRAIN_LLM_BASE_URL }}
          RAGBRAIN_LLM_MODEL: ${{ secrets.RAGBRAIN_LLM_MODEL }}
          RAGBRAIN_NEO4J_URI: bolt://localhost:7687
          RAGBRAIN_NEO4J_USER: neo4j
          RAGBRAIN_NEO4J_PASSWORD: ragbraintest
        run: pytest tests/integration -q
